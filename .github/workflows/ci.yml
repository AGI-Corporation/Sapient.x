name: Sapient.x CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Linting Tools
        run: pip install ruff black isort
      - name: Run Ruff (Linter)
        run: ruff check src/
      - name: Run Black (Formatter)
        run: black --check src/
      - name: Run Isort (Import Sorter)
        run: isort --check src/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SENTIENT_API_KEY: ${{ secrets.SENTIENT_API_KEY }}
      X402_PRIVATE_KEY: ${{ secrets.X402_PRIVATE_KEY }}
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (Unit & Integration)
        run: pytest tests/ -v --asyncio-mode=auto --tb=short

  build:
    name: Build Sapient.x OS Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: sapientx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
